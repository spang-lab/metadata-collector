
# =========================================================
#                     IMPORTANT
# DO NOT EDIT THIS FILE to add custom properties
# or to change existing ones
# The applications depends on these properties to be there
# =========================================================

- key: project_name
  type: project
  permission: none
  data:
    type: input
    name: Name
    sortPriority: 100
    description: A descriptive name for the project
    regex: '^.{3,64}$'

- key: project_description
  type: project
  permission: none
  data:
    type: markdown
    name: Description 
    sortPriority: 90
    description: A description for the project
    regex: ^(.|\n){0,10000}$

- key: sample_name
  type: sample
  permission: none
  data:
    type: input
    name: Name
    sortPriority: 100
    description: A descriptive name for the sample
    regex: '^.{3,64}$'
    examples:
        - abc

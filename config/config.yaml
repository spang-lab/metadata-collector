server:
  port: 8088

client:
  publicUrl: http://localhost:8088
  title: 'Spang Lab Metadata Collector'
  favicon: 'favicon.png'
  faviconIco: 'favicon.ico'
  logo: 'images/logo.png'
  brand: 'Metadata Collector'
  organisation: 'Institute of functional genomics'
  department: 'Statistical Bioinformatics'
  street: 'Am BioPark 9'
  city: '93053 Regensburg'
  country: 'Germany'
  organisationUrl: 'www.spang-lab.de'
  phone: '+49 941 943 5053'
  email: 'sekretariat.genomik@ur.de'
  # only needed for proxying development requests
  # to the webpack dev server
  allowedHosts:
    - '.mhuttner.com'

oidc:
  issuer: https://auth.spang-lab.de/oidc
  userindex: https://auth.spang-lab.de/api/v1/readonly/userindex
  token_endpoint: https://auth.spang-lab.de/api/v1/token/checkv2
  admin_group: "metadata"
  client_id: spang-lab-testing
  redirect_uri: http://localhost:8088/api/v1/callback
  post_logout_redirect_uri: http://localhost:8088/
  response_type: code
  scopes:
    - profile
    - groups



db:
  user: metadata
  host: localhost
  database: metadata
  port: 5432
